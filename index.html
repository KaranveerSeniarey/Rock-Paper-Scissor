<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="icon" href="image/Sword.png" type="image/png">
    <title>Game</title>
</head>

<body >

    <nav class="navbar justify-content-center shadow" style="background-color:#702cf9;">
        <div class="container-fluid d-flex align-items-center justify-content-center">
            <a class="navbar-brand" href="#">
                <img src="image/Sword.png" alt="Logo" width="35" height="35" class="d-inline-block align-text-top">
            </a>
            <h3 class="text-white m-0 harry-font" >
                Rock Paper Scissor Game
            </h3>
        </div>
        <p class="m-0 text-center text-white text-decoration-underline" style="background-color:#702cf9;" >Developed by Karanveer</p>
    </nav>


    <div class="game mt-3">

        <div id="game-div" class="border border-primary border-2 pb-2 px-3 rounded-4 shadow shadow-lg">

            <p class="m-0 round-info-p p-size" >Round: <span id="round-info" >--</span></p>
            <p class="m-0 text-success fs-3 fw-semibold p-win" >You win</p>
            <p class="m-0 text-primary fs-4 fw-semibold p-lost" >Good Luck Next Time</p>
            <p class="m-0 text-primary fs-4 fw-semibold p-draw" >Game Draw</p>

            <img src="image/Sword.png" class="mb-2" id="main-img" alt="Sword">

            <h3 class="border border-3 border-info rounded-4 m-0 mb-2 mt-2" id="game-draw" >Game Draw</h3>

            <div id="game-score">
                <div class="border border-primary border-2 rounded-4 pt-2 pb-2" id="comp-div">
                    <h2 id="comp-choice">--</h2>
                    <h4 class="">comp</h4>
                    <p class="m-0" id="">Score: <span id="comp-score">0</span></p>
                </div>
                <div id="user-div" class="border border-primary border-2 rounded-4 pt-2 pb-2">
                    <h2 id="user-choice">--</h2>
                    <h4>user</h4>
                    <p class="m-0" id="">Score: <span id="user-score">0</span></p>
                </div>
            </div>

            <!-- <p class="m-2" >Choose a button</p> -->

            <div id="game-btn" class="mt-3">
                <button type="button" data-bs-toggle="popover" data-bs-content="-"
                    class="choice-btn btn btn-primary">✊</button>
                <button type="button" data-bs-toggle="popover" data-bs-content="-"
                    class="choice-btn btn btn-primary">✋</button>
                <button type="button" data-bs-toggle="popover" data-bs-content="-"
                    class="choice-btn btn btn-primary">✌️</button>
                        <!-- <button type="button" class="btn btn-lg btn-danger" data-bs-toggle="popover" data-bs-title="Popover title" data-bs-content="And here’s some amazing content. It’s very engaging. Right?">Click to toggle popover</button> -->
            </div>
            <div class="mt-2" id="round-div">
                <p class="m-0">Round</p>
                <input type="number" min="1" value="3" class="form-control" id="round-inp">
            </div>
            <button type="button" class="btn btn-success mt-2" id="start-btn" style="width: 100%;">▷ Start</button>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
